<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Simple Calculator Using HTML & CSS & Javascript">
    <title>Calculator</title>
    <link rel="stylesheet" href="style-calculator.css">
</head>
<body>
    <div class="container">
        
        <input type="text" class="display" value="0" readonly id="output">
        <table>
           <tr>
               <td><button id="C">C</button></td>
               <td><button id="sign">+/-</button></td>
               <td><button id="percent">%</button></td>
               <td><button class="operator" id="divide">÷</button></td>
            </tr>
             <tr>
               <td><button id="one">1</button></td>
               <td><button id="two">2</button></td>
               <td><button id="three">3</button></td>
               <td><button class="operator" id="mul">×</button></td>
            </tr>
             <tr>
               <td><button id="four">4</button></td>
               <td><button id="five">5</button></td>
               <td><button id="six">6</button></td>
               <td><button class="operator" id="add">+</button></td>
            </tr>
             <tr>
               <td><button id="seven">7</button></td>
               <td><button id="eight">8</button></td>
               <td><button id="nine">9</button></td>
               <td><button class="operator" id="sub">-</button></td>
            </tr>
              <tr>
               <td colspan="2" id="zero"><button>0</button></td>
               <td><button id="dot">.</button></td>
               <td><button class="operator" id="equal">=</button></td>
            </tr>
        </table>
    </div> 
    <script src="script.js"></script>
</body>
</html>
